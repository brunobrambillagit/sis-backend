# ==============================
# CONFIGURACIÓN DE LA BASE DE DATOS
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/sis?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
# SI LLEGASE A FALLAR EL USUARIO, Usar root

# ==============================
# JPA / HIBERNATE
# ==============================
# update --> crea las tablas si no existen y mantiene los datos
spring.jpa.hibernate.ddl-auto=update

# Para ver las consultas SQL en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

